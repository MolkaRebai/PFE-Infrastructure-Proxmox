- name: Configuration Application légère Nginx
  hosts: app
  become: true

  tasks:

    - name: Mise à jour du système
      apt:
        update_cache: yes
        upgrade: dist

    - name: Installer Python3
      apt:
        name: python3
        state: present

    - name: Installer Nginx
      apt:
        name: nginx
        state: present

    - name: Créer la page d'accueil
      copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html>
            <head><title>Application Interne</title></head>
            <body>
              <h1>Application interne - 172.19.14.203</h1>
              <p>Déployée avec Terraform + Ansible</p>
            </body>
          </html>

    - name: Démarrer Nginx
      systemd:
        name: nginx
        enabled: yes
        state: started
