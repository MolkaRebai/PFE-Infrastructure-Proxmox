---
- name: Configuration Serveur Zabbix
  hosts: monitoring
  become: true

  vars:
    zabbix_db_name: zabbix
    zabbix_db_user: zabbix
    zabbix_db_password: "Zabbix@2025"
    zabbix_db_host: "172.19.14.55"

  tasks:

    - name: Supprimer le repo CD-ROM
      lineinfile:
        path: /etc/apt/sources.list
        regexp: '.*cdrom.*'
        state: absent

    - name: Mise à jour du système
      apt:
        update_cache: yes
        upgrade: dist

    - name: Installer les dépendances
      apt:
        name:
          - wget
          - curl
          - gnupg
          - python3
          - python3-psycopg2
        state: present

    - name: Télécharger le repo Zabbix
      get_url:
        url: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu24.04_all.deb
        dest: /tmp/zabbix-release.deb

    - name: Installer le repo Zabbix
      apt:
        deb: /tmp/zabbix-release.deb

    - name: Mettre à jour le cache apt
      apt:
        update_cache: yes

    - name: Installer Zabbix Server + Frontend + Agent
      apt:
        name:
          - zabbix-server-pgsql
          - zabbix-frontend-php
          - zabbix-apache-conf
          - zabbix-sql-scripts
          - zabbix-agent
          - postgresql
        state: present

    - name: Démarrer PostgreSQL
      systemd:
        name: postgresql
        enabled: yes
        state: started

    - name: Créer utilisateur PostgreSQL zabbix
      become_user: postgres
      postgresql_user:
        name: "{{ zabbix_db_user }}"
        password: "{{ zabbix_db_password }}"
        state: present

    - name: Créer base de données zabbix
      become_user: postgres
      postgresql_db:
        name: "{{ zabbix_db_name }}"
        owner: "{{ zabbix_db_user }}"
        state: present

    - name: Importer le schéma Zabbix
      become_user: zabbix
      shell: |
        zcat /usr/share/zabbix-sql-scripts/postgresql/server.sql.gz | \
        psql -h localhost -U {{ zabbix_db_user }} {{ zabbix_db_name }}
      args:
        creates: /etc/zabbix/.schema_imported

    - name: Marquer schéma comme importé
      file:
        path: /etc/zabbix/.schema_imported
        state: touch

    - name: Configurer la base de données
      lineinfile:
        path: /etc/zabbix/zabbix_server.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: "^#*DBHost=",     line: "DBHost={{ zabbix_db_host }}" }
        - { regexp: "^#*DBPassword=", line: "DBPassword={{ zabbix_db_password }}" }
        - { regexp: "^#*DBName=",     line: "DBName={{ zabbix_db_name }}" }
        - { regexp: "^#*DBUser=",     line: "DBUser={{ zabbix_db_user }}" }

    - name: Démarrer Zabbix Server + Agent + Apache
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - zabbix-server
        - zabbix-agent
        - apache2

    - name: Configurer UFW
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"
        - "10051"
        - "10050"

    - name: Activer UFW
      ufw:
        state: enabled
        default: deny