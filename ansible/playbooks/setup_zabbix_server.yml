---
- name: Configuration Serveur Zabbix
  hosts: monitoring
  become: true

  vars:
    zabbix_db_name: zabbix
    zabbix_db_user: zabbix
    zabbix_db_password: "Zabbix@2025"
    zabbix_db_host: "172.19.14.55"    
    
  tasks:
    - name: Réparer l'erreur de langue (Locale)
      apt:
        name: locales
        state: present

    - name: Configurer UTF-8
      shell: |
        locale-gen en_US.UTF-8
        update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8
      changed_when: false

    - name: Supprimer le repo CD-ROM
      lineinfile:
        path: /etc/apt/sources.list
        regexp: '.*cdrom.*'
        state: absent

    - name: Mise à jour du système
      apt:
        update_cache: yes
        upgrade: dist

    - name: Installer les dépendances
      apt:
        name:
          - wget
          - curl
          - gnupg
          - python3
          - python3-psycopg2
        state: present

    - name: Télécharger le repo Zabbix
      get_url:
        url: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu24.04_all.deb
        dest: /tmp/zabbix-release.deb

    - name: Installer le repo Zabbix
      apt:
        deb: /tmp/zabbix-release.deb

    - name: Mettre à jour le cache apt
      apt:
        update_cache: yes

    - name: Installer Zabbix Server + Frontend + Agent
      apt:
        name:
          - zabbix-server-pgsql
          - zabbix-frontend-php
          - zabbix-apache-conf
          - zabbix-sql-scripts
          - zabbix-agent
        state: present

    # ── Importer le schéma dans vm-db-01 ─────────────────────
    - name: Importer le schéma Zabbix dans vm-db-01
      shell: |
        zcat /usr/share/zabbix-sql-scripts/postgresql/server.sql.gz | \
        psql -h {{ zabbix_db_host }} -U {{ zabbix_db_user }} {{ zabbix_db_name }}
      environment:
        PGPASSWORD: "{{ zabbix_db_password }}"
      args:
        creates: /etc/zabbix/.schema_imported

    - name: Marquer schéma comme importé
      file:
        path: /etc/zabbix/.schema_imported
        state: touch

    # ── Configurer Zabbix Server ──────────────────────────────
    - name: Configurer zabbix_server.conf
      lineinfile:
        path: /etc/zabbix/zabbix_server.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: "^#*DBHost=",     line: "DBHost={{ zabbix_db_host }}" }
        - { regexp: "^#*DBName=",     line: "DBName={{ zabbix_db_name }}" }
        - { regexp: "^#*DBUser=",     line: "DBUser={{ zabbix_db_user }}" }
        - { regexp: "^#*DBPassword=", line: "DBPassword={{ zabbix_db_password }}" }
      notify: restart zabbix-server

    # ── Démarrer les services ─────────────────────────────────
    - name: Démarrer Zabbix Server + Agent + Apache
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - zabbix-server
        - zabbix-agent
        - apache2

    # ── Firewall ──────────────────────────────────────────────
    - name: Configurer UFW
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"
        - "10051"
        - "10050"

    - name: Activer UFW
      ufw:
        state: enabled
        default: deny

  handlers:
    - name: restart zabbix-server
      systemd:
        name: zabbix-server
        state: restarted