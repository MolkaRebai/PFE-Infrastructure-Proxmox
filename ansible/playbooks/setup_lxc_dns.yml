---
- name: Configuration DNS Réseau (Solution Stable)
  hosts: dns
  become: true
  gather_facts: no  # On désactive pour éviter le crash au premier contact

  tasks:
    - name: 1. Attendre que le SSH soit prêt
      wait_for_connection:
        timeout: 60

    - name: 2. Collecter les informations système
      setup:

    - name: 3. Configurer resolv.conf (DNS Google)
      copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 8.8.8.8
          nameserver 8.8.4.4
        mode: '0644'

    - name: 4. Mise à jour et Installation outils de base
      apt:
        name: [curl, wget, dnsutils, net-tools]
        state: present
        update_cache: yes

    - name: 5. Test de sortie internet
      command: ping -c 2 google.com
      register: ping_test
      changed_when: false

    - name: Résultat
      debug:
        msg: "Connexion OK pour {{ inventory_hostname }}"