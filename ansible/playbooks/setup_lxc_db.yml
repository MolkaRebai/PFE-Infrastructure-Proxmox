- name: Créer l'utilisateur app
      become_user: postgres
      postgresql_user:
        name: appuser
        password: "AppMotDePasse!"
        state: present
        role_attr_flags: "LOGIN"

    - name: Donner les droits sur appdb
      become_user: postgres
      postgresql_privs:
        database: appdb
        roles: appuser
        privs: ALL
        type: database
        state: present